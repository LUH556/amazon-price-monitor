name: Amazon Price Monitor

on:
  # schedule:
  #   - cron: "0 1 * * *"
  workflow_dispatch:  # 手動実行は残しておく

permissions:
  contents: write   # price_history.json を commit するために必要

jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. リポジトリをチェックアウト ──────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python セットアップ ─────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. 依存ライブラリのインストール ──────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # ── 4. 価格チェック実行 ──────────────────────────────────────
      - name: Run price check
        env:
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:      ${{ secrets.NOTIFY_EMAIL }}
        run: python scripts/check_prices.py

      # ── 4b. デバッグHTML をArtifactsに保存（診断用） ─────────────
      - name: Upload debug HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: debug_html/
          retention-days: 3

      # ── 5. 価格履歴を git commit & push ─────────────────────────
      - name: Commit and push price history
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add docs/data/price_history.json
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "chore: update price history $(date -u '+%Y-%m-%d')" && git push
